name: "Code Duplication Analysis"

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: "Analyze code duplication in PR"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Fetch main branch
        run: git fetch origin main --unshallow || true

      - name: Determine merge base
        id: base
        run: |
          base=$(git merge-base origin/main HEAD)
          echo "base=$base" >> $GITHUB_OUTPUT

      - name: Get changed TypeScript files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=d "${{ steps.base.outputs.base }}" HEAD \
            | grep -E '\.(ts|tsx)$' \
            | grep -v 'node_modules' \
            || true)
          if [ -z "$files" ]; then
            echo "count=0" >> $GITHUB_OUTPUT
            echo "files=" >> $GITHUB_OUTPUT
          else
            count=$(echo "$files" | grep -c '\S')
            echo "count=$count" >> $GITHUB_OUTPUT
            echo "files=$(echo "$files" | paste -sd ' ' -)" >> $GITHUB_OUTPUT
          fi

      - name: Get change stats
        id: stats
        run: |
          shortstat=$(git diff --shortstat "${{ steps.base.outputs.base }}" HEAD)
          echo "shortstat=$shortstat" >> $GITHUB_OUTPUT
          commits=$(git rev-list "${{ steps.base.outputs.base }}..HEAD" --count)
          echo "commits=$commits" >> $GITHUB_OUTPUT

      - name: Install jscpd
        run: pnpm add -g jscpd

      - name: Run jscpd on PR files
        id: jscpd_pr
        run: |
          files="${{ steps.changed.outputs.files }}"
          if [ -z "$files" ]; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skipped=false" >> $GITHUB_OUTPUT
          jscpd $files \
            --reporters json,markdown \
            --output report \
            --min-lines 5 \
            --min-tokens 50 \
            --ignore "**/*.test.ts,**/*.spec.ts,**/*.d.ts"

      - name: Run jscpd on main (baseline)
        if: steps.jscpd_pr.outputs.skipped != 'true'
        run: |
          git worktree add /tmp/main-wt origin/main
          jscpd /tmp/main-wt/src \
            --reporters json \
            --output report_main \
            --min-lines 5 \
            --min-tokens 50 \
            --ignore "**/*.test.ts,**/*.spec.ts,**/*.d.ts" || true
          git worktree remove /tmp/main-wt --force

      - name: Upload JSCPD reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jscpd-reports
          path: |
            report
            report_main

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const pr = context.issue.number;
            const COMMENT_MARKER = '<!-- jscpd-report -->';
            const MAX_DUPLICATION = 5;

            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr
            });
            const headSha = prData.head.sha.substring(0, 7);
            const timestamp = new Date().toUTCString();
            const commitCount = parseInt('${{ steps.stats.outputs.commits }}') || 0;

            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              per_page: 100
            });
            const tsFiles = changedFiles.filter(f => /\.(ts|tsx)$/.test(f.filename) && f.status !== 'removed');

            const statsText = '${{ steps.stats.outputs.shortstat }}';
            const added = parseInt((statsText.match(/(\d+) insertions?/) || [])[1] || '0');
            const deleted = parseInt((statsText.match(/(\d+) deletions?/) || [])[1] || '0');
            const filesChanged = parseInt((statsText.match(/(\d+) files? changed/) || [])[1] || '0');

            let body = `${COMMENT_MARKER}\n`;
            body += `## 🔍 Code Analysis Report\n\n`;

            const arrowChange = added > deleted ? '📈' : deleted > added ? '📉' : '⚖️';
            body += `| | |\n|---|---|\n`;
            body += `| **Branch** | \`${prData.head.ref}\` → \`${prData.base.ref}\` |\n`;
            body += `| **Author** | @${prData.user.login} |\n`;
            body += `| **Commit** | \`${headSha}\` |\n`;
            body += `| **Commits in PR** | ${commitCount} |\n`;
            body += `| **Files changed** | ${filesChanged} (${arrowChange} +${added} / -${deleted} lines) |\n`;
            body += `| **Analyzed at** | ${timestamp} |\n\n`;

            if (tsFiles.length > 0) {
              const statusIcon = { added: '🆕', modified: '✏️', renamed: '🔄', removed: '🗑️' };
              body += `<details>\n<summary>📁 TypeScript/TSX files changed (${tsFiles.length})</summary>\n\n`;
              for (const f of tsFiles) {
                const icon = statusIcon[f.status] || '📝';
                body += `- ${icon} \`${f.filename}\` (+${f.additions} / -${f.deletions})\n`;
              }
              body += `\n</details>\n\n`;
            }

            body += `---\n\n`;

            const jsonPathDiff = path.join(process.cwd(), 'report', 'jscpd-report.json');
            const jsonPathMain = path.join(process.cwd(), 'report_main', 'jscpd-report.json');
            const skipped = '${{ steps.jscpd_pr.outputs.skipped }}' === 'true';

            let pctDiff = 0, clones = 0;

            if (skipped) {
              body += `### ✅ Duplication check skipped — no TypeScript files changed.\n\n`;
            } else if (!fs.existsSync(jsonPathDiff)) {
              body += `### ✅ No duplication found in changed files.\n\n`;
            } else {
              const reportDiff = JSON.parse(fs.readFileSync(jsonPathDiff, 'utf8'));
              const total = reportDiff.statistics.total;
              pctDiff = total.percentage || 0;
              clones = total.clones || 0;

              let pctMain = 0;
              if (fs.existsSync(jsonPathMain)) {
                const reportMain = JSON.parse(fs.readFileSync(jsonPathMain, 'utf8'));
                pctMain = reportMain.statistics.total.percentage || 0;
              }
              const delta = pctDiff - pctMain;
              const deltaSign = delta > 0 ? '+' : '';
              const trendArrow = delta > 0 ? '📈' : delta < 0 ? '📉' : '⚖️';

              const statusEmoji = pctDiff === 0 ? '✅' : pctDiff <= MAX_DUPLICATION ? '⚠️' : '❌';
              const badge = pctDiff === 0 ? 'PASS' : pctDiff <= MAX_DUPLICATION ? 'WARN' : 'FAIL';

              body += `### ${statusEmoji} Duplication: **${badge}** — \`${pctDiff.toFixed(2)}%\` (${trendArrow} \`${deltaSign}${delta.toFixed(2)}%\` vs main)\n\n`;
              body += `> Threshold: **${MAX_DUPLICATION}%** | Found **${clones}** duplicate block${clones !== 1 ? 's' : ''} across ${total.sources} file${total.sources !== 1 ? 's' : ''}\n\n`;

              if (clones > 0) {
                let table = `| Format | Files | Lines | Clones | Duplicated (%) |\n|---|---|---|---|---|\n`;
                for (const fmt in reportDiff.statistics.formats) {
                  const s = reportDiff.statistics.formats[fmt].total;
                  table += `| \`${fmt}\` | ${s.sources} | ${s.lines} | ${s.clones} | ${s.duplicatedLines} (${s.percentage.toFixed(2)}%) |\n`;
                }
                table += `| **Total** | ${total.sources} | ${total.lines} | ${total.clones} | ${total.duplicatedLines} (${total.percentage.toFixed(2)}%) |`;
                body += `<details>\n<summary>📊 Statistics by format</summary>\n\n${table}\n\n</details>\n\n`;

                const blocks = reportDiff.duplicates.map((d, i) => {
                  const snippet = d.fragment ? `\n\`\`\`${d.format}\n${d.fragment.trim()}\n\`\`\`\n` : '';
                  return `**#${i + 1}** \`${d.firstFile.name}\` (L${d.firstFile.start}–${d.firstFile.end}) ↔ \`${d.secondFile.name}\` (L${d.secondFile.start}–${d.secondFile.end})${snippet}`;
                }).join('\n\n');
                body += `<details>\n<summary>📄 Duplicate blocks (${clones})</summary>\n\n${blocks}\n\n</details>\n\n`;
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            for (const c of comments) {
              if (c.body?.includes(COMMENT_MARKER)) {
                await github.rest.issues.deleteComment({
                  comment_id: c.id,
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

            if (pctDiff > MAX_DUPLICATION) {
              core.setFailed(`❌ Code duplication (${pctDiff.toFixed(2)}%) exceeds the max threshold (${MAX_DUPLICATION}%). Refactor before merging.`);
            }
